name: YouTube Batch Transcription

# Runs daily at 06:00 UTC (07:00 WAT).
# This workflow ONLY transcribes — it does NOT embed or touch ChromaDB.
# Transcripts are staged to HF Dataset: ezechinnabugwu/synthforge-yt-staging
# Local machine pulls staging and embeds during the normal corpus update sequence.
#
# This separation is the key reliability fix:
#   - Transcription on GH Actions = yt-dlp + Groq API only (no 971MB DB round-trip)
#   - Embedding on local machine = full ChromaDB control, no disk space risk

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  transcribe:
    runs-on: [self-hosted, youtube-capable]
    timeout-minutes: 300  # 5-hour hard ceiling per batch of 30

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install transcription dependencies only
        run: |
          pip install --upgrade pip
          # Transcription pipeline — deliberately minimal to keep install fast
          pip install yt-dlp>=2026.3.17
          pip install groq>=0.5.0
          pip install huggingface-hub>=0.23.0
          pip install youtube-transcript-api>=0.6.0
          # NO chromadb, NO sentence-transformers, NO rank-bm25
          # Those are for embedding — handled locally, not here

      - name: Pull current progress tracker from HF staging
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import hf_hub_download, HfApi
          import os, json, pathlib

          staging_repo = "ezechinnabugwu/synthforge-yt-staging"
          progress_path = "yt_progress.json"

          try:
              local_path = hf_hub_download(
                  repo_id=staging_repo,
                  filename=progress_path,
                  repo_type="dataset",
                  token=os.environ["HF_TOKEN"],
              )
              import shutil
              shutil.copy(local_path, progress_path)
              with open(progress_path) as f:
                  data = json.load(f)
              print(f"Progress loaded: {data.get('completed_count', 0)} videos done")
          except Exception as e:
              print(f"No existing progress (first run or new repo): {e}")
              pathlib.Path(progress_path).write_text(json.dumps({
                  "completed_ids": [],
                  "completed_count": 0,
                  "failed_ids": [],
              }))
          EOF

      - name: Run batch transcription (30 videos, Groq Whisper API)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python src/ingestion/ingest_youtube_actions.py \
            --batch-size 30 \
            --progress-file yt_progress.json \
            --output-dir yt_transcripts_batch

      - name: Upload batch transcripts to HF staging dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os, json, pathlib
          from huggingface_hub import HfApi, upload_file

          api = HfApi(token=os.environ["HF_TOKEN"])
          staging_repo = "ezechinnabugwu/synthforge-yt-staging"
          batch_dir = pathlib.Path("yt_transcripts_batch")

          # Ensure the staging dataset repo exists
          try:
              api.create_repo(
                  repo_id=staging_repo,
                  repo_type="dataset",
                  exist_ok=True,
                  private=False,
              )
          except Exception as e:
              print(f"Repo already exists or create failed: {e}")

          # Upload every transcript JSONL produced in this batch
          uploaded = 0
          for jsonl_file in batch_dir.glob("*.jsonl"):
              try:
                  api.upload_file(
                      path_or_fileobj=str(jsonl_file),
                      path_in_repo=f"transcripts/{jsonl_file.name}",
                      repo_id=staging_repo,
                      repo_type="dataset",
                  )
                  print(f"  Uploaded: {jsonl_file.name}")
                  uploaded += 1
              except Exception as e:
                  print(f"  FAILED {jsonl_file.name}: {e}")

          print(f"Uploaded {uploaded} transcript files to staging.")

          # Upload updated progress tracker
          if pathlib.Path("yt_progress.json").exists():
              api.upload_file(
                  path_or_fileobj="yt_progress.json",
                  path_in_repo="yt_progress.json",
                  repo_id=staging_repo,
                  repo_type="dataset",
              )
              print("Progress tracker updated on HF.")

          with open("yt_progress.json") as f:
              progress = json.load(f)
          print(f"Total completed: {progress.get('completed_count', 0)} / 947")
          EOF

      - name: Report batch summary
        run: |
          echo "=== BATCH SUMMARY ==="
          ls -la yt_transcripts_batch/ 2>/dev/null || echo "No transcripts produced"
          python - <<'EOF'
          import json, pathlib
          progress = json.loads(pathlib.Path("yt_progress.json").read_text())
          completed = progress.get("completed_count", 0)
          failed = len(progress.get("failed_ids", []))
          remaining = 947 - completed
          pct = (completed / 947) * 100
          print(f"Completed : {completed}/947 ({pct:.1f}%)")
          print(f"Remaining : {remaining}")
          print(f"Failed IDs: {failed}")
          EOF
