name: YouTube Batch Transcription

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Max videos to process (default 30)"
        required: false
        default: "30"
  schedule:
    - cron: "0 6 * * *"

env:
  PYTHONPATH: ${{ github.workspace }}
  VECTOR_STORE_PATH: data/vector_store

jobs:
  transcribe-and-embed:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_actions.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-hf-bge-large-en-v1.5-v1

      - name: Install dependencies
        run: pip install -r requirements_actions.txt

      - name: Create directories
        run: mkdir -p logs data/raw data/transcripts data/audio_tmp

      - name: Download vectorstore
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python deploy/download_vectorstore.py

      - name: Download YouTube progress file
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python deploy/download_youtube_progress.py

      - name: Run YouTube transcription batch
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BATCH_SIZE_VIDEOS: ${{ github.event.inputs.batch_size || '30' }}
        run: python src/ingestion/ingest_youtube_groq.py

      - name: Upload YouTube progress file
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python deploy/upload_youtube_progress.py

      - name: Embed new chunks
        run: python src/processing/chunk_and_embed.py
        env:
          BATCH_SIZE: "32"

      - name: Compress vectorstore
        run: python deploy/compress_vectorstore.py

      - name: Build BM25 cache
        run: |
          if [ -f "data/vector_store/bm25_cache.pkl" ]; then
            echo "Downloaded BM25 cache found — copying to deploy/"
            cp data/vector_store/bm25_cache.pkl deploy/bm25_cache.pkl
            echo "BM25 cache ready."
          else
            python deploy/build_bm25_cache.py
          fi

      - name: Upload vectorstore
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python deploy/upload_vectorstore.py

      - name: Restart HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ['HF_TOKEN']).restart_space(
              repo_id=os.environ.get('HF_SPACE_ID','ezechinnabugwu/synthforge'))
          print('Space restarted.')
          "

      - name: Report
        run: echo "YouTube batch complete. $(date -u)"