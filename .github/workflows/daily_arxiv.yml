# .github/workflows/daily_arxiv.yml
# SynthForge — Daily arXiv Ingestion
# =====================================
# Runs every day at 03:00 WAT (02:00 UTC).
# Replaces the local APScheduler arXiv job entirely.
# Also triggerable manually from GitHub → Actions → Run workflow.
#
# Secrets required in GitHub repo settings:
#   HF_TOKEN          — Hugging Face write token
#   HF_DATASET_REPO   — e.g. ezechinnabugwu/synthforge-vectorstore
#   HF_SPACE_ID       — e.g. ezechinnabugwu/synthforge

name: Daily arXiv Ingestion

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC = 03:00 WAT
  workflow_dispatch:        # Manual trigger from GitHub UI — use this to test

env:
  PYTHONPATH: ${{ github.workspace }}
  VECTOR_STORE_PATH: data/vector_store

jobs:
  ingest-arxiv:
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 5-hour hard cap — prevents runaway jobs

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_actions.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache embedding model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-hf-bge-large-en-v1.5-v1
          restore-keys: ${{ runner.os }}-hf-bge-large-

      - name: Install Python dependencies
        run: pip install -r requirements_actions.txt

      - name: Create required directories
        run: mkdir -p logs data/raw data/transcripts data/audio_tmp

      - name: Download existing vectorstore from HF Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python deploy/download_vectorstore.py

      - name: Run arXiv ingestion
        run: python src/ingestion/ingest_arxiv.py

      - name: Embed new chunks (incremental — skips existing SHA-256 IDs)
        run: python src/processing/chunk_and_embed.py
        env:
          BATCH_SIZE: "32"

      - name: Compress vectorstore (SQLite VACUUM)
        run: python deploy/compress_vectorstore.py

      - name: Build BM25 cache
        run: python deploy/build_bm25_cache.py

      - name: Upload vectorstore to HF Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python deploy/upload_vectorstore.py

      - name: Restart HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          space_id = os.environ.get('HF_SPACE_ID', 'ezechinnabugwu/synthforge')
          api.restart_space(repo_id=space_id)
          print(f'Space restart triggered: {space_id}')
          "

      - name: Report completion
        run: |
          echo "arXiv ingestion complete."
          echo "Vectorstore uploaded."
          echo "HF Space restarted."
          echo "Timestamp: $(date -u)"
